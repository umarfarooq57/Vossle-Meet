  # coturn:
  #   image: coturn/coturn:latest
  #   ports:
  #     - "3478:3478/tcp"
  #     - "3478:3478/udp"
  #     - "5349:5349/tcp"
  #     - "5349:5349/udp"
  #     - "49152-65535:49152-65535/udp"
  #   environment:
  #     - DETECT_EXTERNAL_IP=yes
  #     - DETECT_RELAY_IP=yes
  #   volumes:
  #     - ./turnserver.conf:/etc/coturn/turnserver.conf
  #   restart: unless-stopped
