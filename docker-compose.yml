version: '3.8'

services:
  vossle-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-vossle_jwt_secret_production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-vossle_refresh_secret_production}
      - JWT_EXPIRE=15m
      - JWT_REFRESH_EXPIRE=7d
      - CLIENT_URL=http://localhost:5000
      - STUN_URL=stun:stun.l.google.com:19302
      - TURN_URL=${TURN_URL:-}
      - TURN_USERNAME=${TURN_USERNAME:-}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  # Optional: coturn TURN server for NAT traversal
  # Uncomment below to run your own TURN server
